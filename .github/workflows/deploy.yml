name: Deploy Pages on Update

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      # Wraps the deployment step in an automated retry wrapper
      - name: Deploy to GitHub Pages (With Automated Retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            # We must pass the internal token explicitly when running as a shell command
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} npx @actions/deploy-pages
            
