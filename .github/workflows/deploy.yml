name: Deploy Pages on Update

on:
  push:
    branches: ["main"]
  workflow_dispatch:
   
permissions:
  pages: write
  id-token: write

# This block is the critical fix. It instantly kills any stale or 
# simultaneous duplicate runs before they can create a second artifact.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
